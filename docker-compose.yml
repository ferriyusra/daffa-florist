services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-daffa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-daffa}
      POSTGRES_DB: ${POSTGRES_DB:-daffa_florist}
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-daffa}']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-daffa}:${POSTGRES_PASSWORD:-daffa}@db:5432/${POSTGRES_DB:-daffa_florist}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NODE_ENV: production
    ports:
      - '3000:3000'
    volumes:
      - uploads:/app/public/uploads

volumes:
  db-data:
  uploads:
